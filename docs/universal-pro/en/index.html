<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DIVEROID Universal Pro — English Guide</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0a0e1a;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 20px;
      }
      .logo {
        font-size: 12px;
        letter-spacing: 4px;
        color: #50a9fc;
        text-transform: uppercase;
        margin-bottom: 16px;
      }
      h1 {
        font-size: 22px;
        font-weight: 300;
        margin-bottom: 8px;
      }
      p {
        font-size: 14px;
        color: #64748b;
        margin-bottom: 32px;
      }
      a {
        color: #50a9fc;
        font-size: 13px;
      }
      .safety-warning {
        max-width: 560px;
        margin: 0 auto 32px;
        background: linear-gradient(135deg, #fff4f4 0%, #ffe4e4 100%);
        border: 2px solid #d92d20;
        border-left: 6px solid #d92d20;
        border-radius: 12px;
        padding: 18px 22px;
        text-align: left;
        display: flex;
        gap: 14px;
        align-items: flex-start;
        box-shadow: 0 4px 16px rgba(217, 45, 32, 0.18);
      }
      .safety-warning .ico {
        font-size: 28px;
        line-height: 1;
        flex-shrink: 0;
      }
      .safety-warning .title {
        font-weight: 700;
        color: #b42318;
        font-size: 14px;
        letter-spacing: 0.3px;
        margin-bottom: 6px;
      }
      .safety-warning .body {
        color: #1a1a1a;
        font-size: 13px;
        line-height: 1.65;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="logo">DIVEROID</div>
    <h1>Universal Pro — English Guide</h1>

    <div class="safety-warning" role="alert">
      <div class="ico">⚠️</div>
      <div>
        <div class="title">Safety Notice</div>
        <div class="body">
          NEW UNIVERSAL PRO does
          <strong>not include a dive computer function</strong>. Please use a
          <strong>separate dive computer</strong> to ensure safe diving.
        </div>
      </div>
    </div>

    <p>English guide coming soon.<br />한국어 가이드를 이용해 주세요.</p>
    <a href="../kr/">🇰🇷 한국어 가이드 보기</a>
  </body>
</html>
